# docker-compose.yml 核心服务编排

services:



  nginx:

    image: nginx:1.26-alpine

    container_name: diabetes-nginx

    ports:

      - "80:80"

      - "81:81"

    volumes:

      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro

    depends_on:

      gateway:

        condition: service_started

      user-service:

        condition: service_started

      frontend:

        condition: service_started

      admin-frontend:

        condition: service_started

    extra_hosts:

      - "host.docker.internal:host-gateway"

    restart: unless-stopped



  mysql:

    image: mysql:8.0

    container_name: diabetes-mysql

    ports:

      - "3307:3306"

    environment:

      - TZ=Asia/Shanghai

      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}

      - MYSQL_ROOT_HOST=%

    volumes:

      - ./docker/mysql/data:/var/lib/mysql

      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:

      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]

      interval: 10s

      timeout: 5s

      retries: 10

      start_period: 30s



  minio:

    image: minio/minio:latest

    container_name: diabetes-minio

    ports:

      - "9000:9000"

      - "9001:9001"

    environment:

      - TZ=Asia/Shanghai

      - MINIO_ROOT_USER=${MINIO_USER}

      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}

    command: server /data --console-address ":9001"

    volumes:

      - ./docker/minio/data:/data



  redis:

    image: redis:7.2-alpine

    container_name: diabetes-redis

    ports:

      - "6380:6379"

    environment:

      - TZ=Asia/Shanghai

    command: redis-server --requirepass ${REDIS_PASSWORD}

    volumes:

      - ./docker/redis/data:/data

    healthcheck:

      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]

      interval: 10s

      timeout: 5s

      retries: 5

    restart: unless-stopped



  milvus:

    image: milvusdb/milvus:v2.4.15

    container_name: diabetes-milvus

    command: ["milvus", "run", "standalone"]

    environment:

      - TZ=Asia/Shanghai

      - ETCD_USE_EMBED=true

      - COMMON_STANDALONE=true

      - MINIO_ADDRESS=minio:9000

      - MINIO_ACCESS_KEY_ID=${MINIO_USER}

      - MINIO_SECRET_ACCESS_KEY=${MINIO_PASSWORD}

    ports:

      - "19530:19530"

      - "9091:9091"

    volumes:

      - ./docker/milvus/data:/var/lib/milvus

    depends_on:

      minio:

        condition: service_started

    healthcheck:

      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]

      interval: 20s

      timeout: 10s

      retries: 12

      start_period: 120s

    restart: unless-stopped



  gateway:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: gateway

    container_name: diabetes-gateway

    ports:

      - "8099:8099"

    environment:

      - TZ=Asia/Shanghai

      - USER_SERVICE_HOST=user-service

      - HOME_SERVICE_HOST=home-service

      - HEALTH_SERVICE_HOST=health-service

      - CHECKIN_SERVICE_HOST=checkin-service

      - CONSULTATION_SERVICE_HOST=consultation-service

      - PLAN_SERVICE_HOST=plan-service

      - ARTICLE_SERVICE_HOST=article-service

      - AUDIT_SERVICE_HOST=audit-service

    depends_on:

      user-service:

        condition: service_started

      home-service:

        condition: service_started

      health-service:

        condition: service_started

      checkin-service:

        condition: service_started

      consultation-service:

        condition: service_started

      plan-service:

        condition: service_started

      article-service:

        condition: service_started

      audit-service:

        condition: service_started

    restart: unless-stopped



  user-service:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: user-service

    container_name: diabetes-user-service

    environment: &backend-env

      - TZ=Asia/Shanghai

      - MYSQL_HOST=mysql

      - MYSQL_PORT=3306

      - MYSQL_USER=root

      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}

      - JWT_SECRET=${JWT_SECRET}

      - DIFY_INTERNAL_KEY=${DIFY_INTERNAL_KEY}

      - USER_SERVICE_HOST=user-service

      - HEALTH_SERVICE_HOST=health-service

      - CHECKIN_SERVICE_HOST=checkin-service

      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://host.docker.internal:58080}

      - DIFY_RISK_API_KEY=${DIFY_RISK_API_KEY:-app-XuGJ0yp3XhejVrzE88dL1kHk}

      - DIFY_RISK_TRIGGER_MODE=${DIFY_RISK_TRIGGER_MODE:-api}

      - DIFY_RISK_INPUT_VAR=${DIFY_RISK_INPUT_VAR:-flat}

      - DIFY_RISK_INPUT_FORMAT=${DIFY_RISK_INPUT_FORMAT:-object}

      - DIFY_RISK_WEBHOOK_PATH=${DIFY_RISK_WEBHOOK_PATH:-/triggers/webhook/IW0ky4jldf98EPYU4uWkvuut}

      - DIFY_PLAN_API_KEY=${DIFY_PLAN_API_KEY:-app-fHORDdQjVq9GVtLcyD9WaL3g}

      - DIFY_ARTICLE_RECOMMEND_API_KEY=${DIFY_ARTICLE_RECOMMEND_API_KEY:-app-zBXmLq9LXjrF8UtuL9d8PhiS}

      - DIFY_ARTICLE_DRAFT_API_KEY=${DIFY_ARTICLE_DRAFT_API_KEY:-app-zBXmLq9LXjrF8UtuL9d8PhiS}

      - DIFY_ARTICLE_RECOMMEND_INPUT_VAR=${DIFY_ARTICLE_RECOMMEND_INPUT_VAR:-inputs}

      - DIFY_ARTICLE_RECOMMEND_INPUT_FORMAT=${DIFY_ARTICLE_RECOMMEND_INPUT_FORMAT:-object}

      - DIFY_ARTICLE_RECOMMEND_RESPONSE_MODE=${DIFY_ARTICLE_RECOMMEND_RESPONSE_MODE:-blocking}

      - DIFY_CHECKIN_API_KEY=${DIFY_CHECKIN_API_KEY:-app-kFnPhD8YUmCfG2DeHubp1Scc}

      - DIFY_CHECKIN_RESPONSE_MODE=${DIFY_CHECKIN_RESPONSE_MODE:-blocking}

      - DIFY_QA_API_KEY=${DIFY_QA_API_KEY:-app-B3WaGEZUVWU8Lbp7qo0lzdVj}

      - DIFY_CONSULTATION_API_KEY=${DIFY_CONSULTATION_API_KEY:-app-2GKxEwwawkXoFSH0APRwPWHD}

      - DIFY_CONSULTATION_RESPONSE_MODE=${DIFY_CONSULTATION_RESPONSE_MODE:-blocking}

      - REDIS_HOST=redis

      - REDIS_PORT=6379

      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - MINIO_HOST=minio

      - MINIO_PORT=9000

      - MINIO_USER=${MINIO_USER}

      - MINIO_PASSWORD=${MINIO_PASSWORD}

      - MINIO_PUBLIC_URL=http://localhost:9000

      - MILVUS_ENABLED=${MILVUS_ENABLED:-true}

      - MILVUS_HOST=milvus

      - MILVUS_PORT=19530

      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}

      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}

      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}

      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}

      - MILVUS_DIMENSION=${MILVUS_DIMENSION:-384}

    depends_on:

      mysql:

        condition: service_healthy

      minio:

        condition: service_started

      milvus:

        condition: service_healthy

    restart: unless-stopped



  home-service:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: home-service

    container_name: diabetes-home-service

    environment: *backend-env

    extra_hosts:

      - "host.docker.internal:host-gateway"

    depends_on:

      mysql:

        condition: service_healthy

      minio:

        condition: service_started

      milvus:

        condition: service_healthy

    restart: unless-stopped



  health-service:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: health-service

    container_name: diabetes-health-service

    environment: *backend-env

    extra_hosts:

      - "host.docker.internal:host-gateway"

    depends_on:

      mysql:

        condition: service_healthy

    restart: unless-stopped



  checkin-service:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: checkin-service

    container_name: diabetes-checkin-service

    environment: *backend-env

    extra_hosts:

      - "host.docker.internal:host-gateway"

    depends_on:

      mysql:

        condition: service_healthy

      redis:

        condition: service_healthy

      minio:

        condition: service_started

    restart: unless-stopped



  consultation-service:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: consultation-service

    container_name: diabetes-consultation-service

    environment: *backend-env

    depends_on:

      mysql:

        condition: service_healthy

    restart: unless-stopped



  plan-service:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: plan-service

    container_name: diabetes-plan-service

    environment: *backend-env

    extra_hosts:

      - "host.docker.internal:host-gateway"

    depends_on:

      mysql:

        condition: service_healthy

    restart: unless-stopped



  article-service:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: article-service

    container_name: diabetes-article-service

    environment: *backend-env

    extra_hosts:

      - "host.docker.internal:host-gateway"

    depends_on:

      mysql:

        condition: service_healthy

      redis:

        condition: service_healthy

      minio:

        condition: service_started

      health-service:

        condition: service_started

      milvus:

        condition: service_healthy

    restart: unless-stopped



  audit-service:

    build:

      context: ./backend

      dockerfile: Dockerfile

      args:

        SERVICE: audit-service

    container_name: diabetes-audit-service

    environment: *backend-env

    depends_on:

      mysql:

        condition: service_healthy

    restart: unless-stopped



  frontend:

    image: node:20-alpine

    container_name: diabetes-frontend

    working_dir: /app

    ports:

      - "5173:5173"

    environment:

      - TZ=Asia/Shanghai

      - CHOKIDAR_USEPOLLING=true

      - VITE_PROXY_TARGET=http://gateway:8099

      - VITE_USER_SERVICE_TARGET=http://user-service:8081

      - VITE_ADMIN_PORTAL_URL=http://localhost:81

    depends_on:

      gateway:

        condition: service_started

      user-service:

        condition: service_started

    volumes:

      - ./frontend:/app

      - frontend_node_modules:/app/node_modules

    command: sh -c "npm install && npm run dev"

    restart: unless-stopped



  admin-frontend:

    image: node:20-alpine

    container_name: diabetes-admin-frontend

    working_dir: /app

    ports:

      - "5174:5174"

    environment:

      - TZ=Asia/Shanghai

      - CHOKIDAR_USEPOLLING=true

      - VITE_PROXY_TARGET=http://gateway:8099

      - VITE_USER_SERVICE_TARGET=http://user-service:8081

      - VITE_USER_PORTAL_URL=http://localhost

      - VITE_DIFY_USE_PROXY=true

      - VITE_DIFY_PROXY_PREFIX=/dify-proxy

      - VITE_DIFY_PROXY_TARGET=http://host.docker.internal:58080

    depends_on:

      gateway:

        condition: service_started

      user-service:

        condition: service_started

    volumes:

      - ./admin-frontend:/app

      - admin_frontend_node_modules:/app/node_modules

    command: sh -c "npm install && npm run dev"

    restart: unless-stopped



volumes:

  frontend_node_modules:

  admin_frontend_node_modules:

