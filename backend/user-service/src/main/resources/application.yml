server:
  port: 8081

spring:
  application:
    name: user-service
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.qq.com
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/DIABETES_USER?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_ROOT_PASSWORD:mysql123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 600000
      keepalive-time: 300000
      connection-test-query: SELECT 1

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.diabetes.user.entity
  configuration:
    map-underscore-to-camel-case: false
    default-statement-timeout: 30

jwt:
  secret: ${JWT_SECRET:diabetes_jwt_secret_key_at_least_32_chars}
  access-expire-seconds: 7200
  refresh-expire-seconds: 604800

# Dify 工作流调用内部接口时携带的密钥（Header: X-Dify-Key）
dify:
  base-url: ${DIFY_BASE_URL:http://host.docker.internal:58080}
  timeout-seconds: ${DIFY_TIMEOUT_SECONDS:120}
  internal-key: ${DIFY_INTERNAL_KEY:LoginAuth2026}
  workflows:
    health-trend:
      api-key: ${DIFY_HEALTH_TREND_API_KEY:app-2aWyzKF49e9qp1WDuGSsUmlE}
      response-mode: ${DIFY_HEALTH_TREND_RESPONSE_MODE:blocking}

dify-internal:
  key: ${DIFY_INTERNAL_KEY:LoginAuth2026}

intervention:
  cooldown-hours: ${INTERVENTION_COOLDOWN_HOURS:4}
  daily-alert-max: ${INTERVENTION_DAILY_ALERT_MAX:2}
  scheduler-cron: ${INTERVENTION_SCHEDULER_CRON:0 0 8 * * ?}

services:
  audit:
    base-url: http://${AUDIT_SERVICE_HOST:localhost}:${AUDIT_SERVICE_PORT:8088}
  health:
    base-url: http://${HEALTH_SERVICE_HOST:localhost}:${HEALTH_SERVICE_PORT:8083}
  checkin:
    base-url: http://${CHECKIN_SERVICE_HOST:localhost}:${CHECKIN_SERVICE_PORT:8084}
  plan:
    base-url: http://${PLAN_SERVICE_HOST:localhost}:${PLAN_SERVICE_PORT:8086}
  consultation:
    base-url: http://${CONSULTATION_SERVICE_HOST:localhost}:${CONSULTATION_SERVICE_PORT:8085}

minio:
  endpoint: http://${MINIO_HOST:localhost}:${MINIO_PORT:9000}
  access-key: ${MINIO_USER:minio}
  secret-key: ${MINIO_PASSWORD:minio123456}
  profile-bucket: profile
  export-bucket: export
  public-base-url: ${MINIO_PUBLIC_URL:http://localhost:9000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
