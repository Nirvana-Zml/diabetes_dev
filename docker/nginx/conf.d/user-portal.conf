# 用户端入口：http://localhost/
server {
    listen 80;
    server_name localhost;

    include /etc/nginx/conf.d/snippets/api-proxy.conf;

    location / {
        set $backend "http://frontend:5173";
        proxy_pass $backend;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
