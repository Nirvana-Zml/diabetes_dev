# 管理端入口：http://localhost:81/
server {
    listen 81;
    server_name localhost;

    include /etc/nginx/conf.d/snippets/api-proxy.conf;

    location / {
        set $backend "http://admin-frontend:5174";
        proxy_pass $backend;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
