# 糖尿病风险评估：Dify 阻塞模式常需 30~120s
location ^~ /api/v1/risk/ {
    set $backend "http://gateway:8099";
    proxy_pass $backend;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    proxy_connect_timeout 60s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
}


# 登录/注册/管理统计直连 user-service，避免 Gateway(Netty) 与部分 HTTP 客户端兼容问题
location ~ ^/api/v1/(auth|user|admin/stats)(/|$) {
    set $backend "http://user-service:8081";
    proxy_pass $backend;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

location ~ ^/api/v2/(auth|user)(/|$) {
    set $backend "http://user-service:8081";
    proxy_pass $backend;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

