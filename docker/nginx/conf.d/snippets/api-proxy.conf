# 管理端视频上传：大文件 + 较长超时（含列表 POST /api/v1/admin/videos 无尾斜杠）
location ^~ /api/v1/admin/videos {
    set $backend "http://gateway:8099";
    proxy_pass $backend;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    proxy_connect_timeout 120s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    client_max_body_size 520m;
}

location ^~ /api/v2/admin/videos {
    set $backend "http://gateway:8099";
    proxy_pass $backend;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    proxy_connect_timeout 120s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    client_max_body_size 520m;
}

# 科普问答 SSE：关闭缓冲，长连接
location ^~ /api/v1/chat/ {
    set $backend "http://gateway:8099";
    proxy_pass $backend;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
}

# 管理端 AI 初稿：浏览器经同源 /dify-proxy 访问 Dify（SSE 长连接）
location ^~ /dify-proxy/ {
    proxy_pass http://host.docker.internal:58080/;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    proxy_buffering off;
    proxy_cache off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding off;
}

