# 管理端静态资源（Ngrok / 演示）：http://localhost:81/
server {
    listen 81;
    server_name localhost;

    root /usr/share/nginx/html/admin;
    index index.html;

    include /etc/nginx/conf.d/snippets/api-proxy.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
