# Maven 构建/测试工具容器（不参与业务运行时编排）
#
# 注意：不要写 `docker compose run maven -version`，Compose 会把 -v 当成卷参数。
# 请用以下任一方式：
#   .\docker\maven\mvn.ps1 -version
#   docker compose -f docker-compose.maven.yml run --rm --entrypoint sh maven -c "mvn -version"

services:

  maven:
    image: maven:3.9-eclipse-temurin-17-alpine
    container_name: diabetes-maven
    working_dir: /app
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./backend:/app
      - ./docker/maven/repository:/root/.m2/repository
      - ./docker/maven/settings.xml:/root/.m2/settings.xml:ro
    profiles:
      - tools
